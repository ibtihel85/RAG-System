

data:
  dataset: "rajpurkar/squad_v2"
  split: "validation"          # train | validation
  max_corpus_docs: 6000
  max_qa_samples: 400
  answerable_only: true
  chunk_window: 4              # sentences per chunk
  chunk_stride: 2              # stride between chunks

retrieval:
  bm25: {}                     # no extra params (uses defaults)
  dense:
    model_name: "BAAI/bge-base-en-v1.5"
    batch_size: 64
  hybrid:
    k_intra: 60
    k_inter: 10
    bm25_weight: 1.0
    dense_weight: 1.6

reranker:
  model_name: "cross-encoder/ms-marco-MiniLM-L-6-v2"
  max_length: 512

generator:
  model_name: "meta-llama/Llama-3.1-8B-Instruct"
  max_new_tokens: 30
  temperature: 0.0
  # hf_token: ""               # set via HF_TOKEN env variable

pipeline:
  retrieval_pool: 150
  rerank_top_k: 50
  final_top_k: 5
  n_eval_samples: 300
  use_diversity: true
  div_threshold: 0.55

evaluation:
  faithfulness: true           # runs NLI model; set false to skip on CPU
  relevance: true
  k_values: [1, 3, 5]
  nli_model: "MoritzLaurer/DeBERTa-v3-base-mnli-fever-anli"

misc:
  seed: 42
  log_level: "INFO"
