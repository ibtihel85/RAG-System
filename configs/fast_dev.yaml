# Fast dev config — small corpus, no LLM (retrieval + eval only)
# Usage: python main.py --config configs/fast_dev.yaml --no-generate

data:
  dataset: "rajpurkar/squad_v2"
  split: "validation"
  max_corpus_docs: 500
  max_qa_samples: 50
  answerable_only: true
  chunk_window: 4
  chunk_stride: 2

retrieval:
  bm25: {}
  dense:
    model_name: "BAAI/bge-base-en-v1.5"
    batch_size: 32
  hybrid:
    k_intra: 60
    k_inter: 10
    bm25_weight: 1.0
    dense_weight: 1.6

reranker:
  model_name: "cross-encoder/ms-marco-MiniLM-L-6-v2"
  max_length: 512

pipeline:
  retrieval_pool: 50
  rerank_top_k: 20
  final_top_k: 5
  n_eval_samples: 50
  use_diversity: true
  div_threshold: 0.55

evaluation:
  faithfulness: false
  relevance: true
  k_values: [1, 3, 5]

misc:
  seed: 42
  log_level: "INFO"
